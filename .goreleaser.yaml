version: 2

project_name: hackernews

before:
  hooks:
    - go mod tidy

builds:
  - id: hackernews
    main: ./cmd/hackernews
    binary: hackernews
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: checksums.txt

brews:
  - name: hackernews
    ids: [default]
    directory: Formula
    repository:
      owner: elpdev
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore: update hackernews formula to {{ .Tag }}"
    homepage: https://github.com/elpdev/hackernews
    description: "Terminal UI for browsing Hacker News, reading articles, comments, and saved stories"
    license: MIT
    install: |
      bin.install "hackernews"

aurs:
  - name: hackernews-bin
    ids: [default]
    homepage: https://github.com/elpdev/hackernews
    description: "Terminal UI for browsing Hacker News, reading articles, comments, and saved stories"
    maintainers: ["elpdev <noreply@github.com>"]
    license: MIT
    private_key: "{{ .Env.AUR_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/hackernews-bin.git"
    skip_upload: auto
    package: |-
      install -Dm755 hackernews "${pkgdir}/usr/bin/hackernews"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
